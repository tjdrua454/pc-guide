<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>부품 소개</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>컴퓨터 부품 소개</h1>
</header>

<section class="cards">

<div class="card">
<h3>CPU</h3>
<p>컴퓨터의 연산과 처리 작업을 담당하는 핵심 부품</p>
</div>

<div class="card">
<h3>GPU</h3>
<p>그래픽 처리와 게임 성능에 큰 영향을 주는 부품</p>
</div>

<div class="card">
<h3>RAM</h3>
<p>프로그램 실행을 위한 임시 저장 공간</p>
</div>

<div class="card">
<h3>SSD</h3>
<p>운영체제와 데이터를 저장하는 고속 저장장치</p>
</div>

<div class="card">
<h3>메인보드</h3>
<p>모든 부품을 연결하는 중심 회로 기판</p>
</div>

<div class="card">
<h3>파워서플라이</h3>
<p>각 부품에 안정적으로 전력을 공급</p>
</div>

</section>

</body>
</html>
